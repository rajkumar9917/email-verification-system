{% load static %}
<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{% block title %}Athenura{% endblock %}</title>
    <link
      rel="icon"
      type="image/x-icon"
      sizes="32x32"
      href="{% static 'images/favicon.ico' %}"
    />
    {% block css %}{% endblock %}
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Icons"
      rel="stylesheet"
    />

    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#6366f1", // Vibrant indigo for buttons/links
              "primary-hover": "#4f46e5", // Slightly darker for hover states
              "background-light": "#f6f6f8", // Kept untouched for your light mode
              "background-dark": "#0b0c15", // Deep slate/indigo base background
              surface: "#141522", // Cards, inputs, and icon circles
              "text-muted": "#94a3b8", // Grayish-blue for paragraphs
              "border-subtle": "#1e1f32", // Subtle divider lines
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-[#0f0e1b] antialiased"
  >
    {% include "website/components/navbar.html" %} 
    {% include "website/components/toast.html" %} 
    {% block content %}{% endblock %} 
    {% include "website/components/footer.html" %}

    <script>
      function togglePassword(fieldId, btn) {
        const input = document.getElementById(fieldId);
        const icon = btn.querySelector("span");

        if (input.type === "password") {
          input.type = "text";
          icon.textContent = "visibility_off";
        } else {
          input.type = "password";
          icon.textContent = "visibility";
        }
      }
    </script>
  </body>
</html>
