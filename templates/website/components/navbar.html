{% load static %}
<header
  class="sticky top-0 z-50 w-full bg-background-dark border-b border-border-subtle"
>
  <div class="max-w-9xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <a href="{% url 'home' %}" class="flex items-center gap-2">
        <span class="text-xl font-extrabold tracking-tight text-white">
          <img
            src="{% static 'images/White.png' %}"
            alt="Athenura"
            class="h-11"
          />
        </span>
      </a>

      <div class="flex items-center gap-6 sm:gap-8">
        <nav class="hidden md:flex items-center gap-5">
          <a
            href="{% url 'home' %}"
            class="text-sm font-medium transition-colors {% if request.resolver_match.url_name == 'home' %} text-primary {% else %} text-text-muted hover:text-white {% endif %}"
          >
            Home
          </a>

          {% if request.user.is_authenticated %}
          <a
            href="{% url 'email_verifier:index' %}"
            class="text-sm font-medium transition-colors {% if request.resolver_match.app_name == 'email_verifier' %} text-primary {% else %} text-text-muted hover:text-white {% endif %}"
          >
            Email Verifier
          </a>

          <a
            href="{% url 'bulk_sender:index' %}"
            class="text-sm font-medium transition-colors {% if request.resolver_match.app_name == 'bulk_sender' %} text-primary {% else %} text-text-muted hover:text-white {% endif %}"
          >
            Bulk Sender
          </a>
          {% endif %}
        </nav>

        <div class="flex items-center gap-4">
          {% if request.user.is_authenticated %}
          <div class="relative">
            <button
              id="user-menu-button"
              class="flex items-center gap-3 pl-4 sm:pl-6 border-l border-border-subtle group"
            >
              <div class="text-right hidden sm:block">
                <p class="text-sm font-semibold text-white">
                  {{ request.user.full_name }}
                </p>
                <p class="text-xs text-primary">{{ request.user.email }}</p>
              </div>

              <div class="relative h-10 w-10 rounded-full border-2 border-primary/30 transition-all duration-300 group-hover:scale-105 group-hover:border-primary">
    
    <div class="h-full w-full rounded-full overflow-hidden">
        {% if request.user.profile.profile_image %}
        <img
            src="{{ request.user.profile.profile_image.url }}"
            class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-110"
        />
        {% else %}
        <div class="h-full w-full flex items-center justify-center bg-gradient-to-br from-primary to-indigo-500 text-white font-bold text-lg">
            {{ request.user.full_name|first|upper }}
        </div>
        {% endif %}
    </div>

    <span class="absolute bottom-0 right-0 block h-3 w-3 rounded-full bg-green-500 border-2 border-background-dark transform translate-x-1/4 translate-y-1/4 z-10"></span>
</div>
            </button>

            <div
              id="user-dropdown"
              class="hidden absolute right-0 mt-4 w-60 bg-surface border border-border-subtle rounded-xl shadow-xl p-2 z-50 animate-fade-in"
            >
              <a
                href="{% url 'account:profile' %}"
                class="flex items-center gap-3 px-4 py-2 rounded-lg text-sm font-medium text-text-muted hover:text-white hover:bg-[#1e1f32] transition"
              >
                <span class="material-symbols-outlined text-base">person</span>
                Edit Profile
              </a>

              <a
                href="{% url 'account:change_password' %}"
                class="flex items-center gap-3 px-4 py-2 rounded-lg text-sm font-medium text-text-muted hover:text-white hover:bg-[#1e1f32] transition"
              >
                <span class="material-symbols-outlined text-base">lock</span>
                Change Password
              </a>

              <hr class="my-2 border-border-subtle" />

              <a
                href="{% url 'account:logout' %}"
                class="flex items-center gap-3 px-4 py-2 rounded-lg text-sm font-semibold text-red-400 hover:bg-red-500/10 transition"
              >
                <span class="material-symbols-outlined text-base">logout</span>
                Logout
              </a>
            </div>
          </div>

          {% else %}

          <a
            href="{% url 'account:signin' %}"
            class="px-4 py-2 text-sm font-medium rounded-lg transition {% if request.resolver_match.url_name == 'signin' %} bg-primary/90 text-white hover:bg-primary-hover {% else %} text-text-muted hover:text-white {% endif %}"
          >
            Sign In
          </a>

          <a
            href="{% url 'account:signup' %}"
            class="px-5 py-2 text-sm font-medium rounded-lg transition {% if request.resolver_match.url_name == 'signup' %} bg-primary text-white shadow-lg shadow-primary/20 {% else %} text-text-muted hover:text-white {% endif %}"
          >
            Sign Up
          </a>

          {% endif %}
        </div>
      </div>
    </div>
  </div>
</header>
<script>
  const button = document.getElementById("user-menu-button");
  const dropdown = document.getElementById("user-dropdown");

  if (button) {
    button.addEventListener("click", () => {
      dropdown.classList.toggle("hidden");
    });

    window.addEventListener("click", function (e) {
      if (!button.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.add("hidden");
      }
    });
  }
</script>
