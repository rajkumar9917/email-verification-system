<div class="max-w-5xl mx-auto">
  <h1 class="text-3xl font-bold text-center text-slate-800 mb-8">
    Email Verification System
  </h1>

  <nav class="bg-white border-b border-slate-100 sticky top-0 z-50 shadow-sm rounded-lg mb-6">
    <div class="px-4 md:px-8">
      <div class="flex justify-between items-center h-16">

        <!-- LOGO -->
        <a href="{% url 'email_verifier:index' %}">
          <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-1.5 rounded-lg">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </div>
            <span class="text-lg font-bold text-slate-800 tracking-tight">
              Mail<span class="text-blue-600">Master</span>
            </span>
          </div>
        </a>

        <!-- NAV TABS -->
        <div class="flex items-center justify-center gap-1 bg-slate-200/50 p-1.5 rounded-2xl border border-slate-200 shadow-inner">

          <!-- Verifier -->
          <a
            href="{% url 'email_verifier:index' %}"
            class="flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-bold transition-all duration-200
            {% if request.resolver_match.app_name == 'email_verifier' %}
              bg-white text-blue-600 shadow-sm
            {% else %}
              text-slate-500 hover:text-slate-700 hover:bg-slate-200/50
            {% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
              viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            Verifier
          </a>

          <!-- Bulk Sender -->
          <a
            href="{% url 'bulk_sender:index' %}"
            class="flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-bold transition-all duration-200
            {% if request.resolver_match.app_name == 'bulk_sender' %}
              bg-white text-blue-600 shadow-sm
            {% else %}
              text-slate-500 hover:text-slate-700 hover:bg-slate-200/50
            {% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
              viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
            Bulk Sender
          </a>
        </div>

        <!-- STATUS -->
        <div class="hidden md:flex items-center gap-2 bg-green-50 px-3 py-1 rounded-full border border-green-100">
          <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
          <span class="text-[10px] font-bold text-green-700 uppercase">
            System Ready
          </span>
        </div>

      </div>
    </div>
  </nav>
</div>
