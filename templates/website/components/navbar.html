<!-- Top Navigation Bar -->
<header
  class="sticky top-0 z-50 w-full bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-[#e8e8f3] dark:border-primary/20"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <!-- Logo -->
      <a href="{% url 'home' %}">
        <div class="flex items-center gap-2">
          <div
            class="bg-primary text-white p-1.5 rounded-lg flex items-center justify-center"
          >
            <span class="material-symbols-outlined text-xl"
              >alternate_email</span
            >
          </div>
          <span
            class="text-xl font-extrabold tracking-tight text-[#0f0e1b] dark:text-white"
            >EmailPro</span
          >
        </div></a
      >
      <!-- Desktop Nav Links -->
      <nav class="hidden md:flex items-center space-x-8">
        <a
          class="text-lg font-bold transition-colors {% if request.resolver_match.url_name == 'home' %} hover:text-primary text-primary {% else %} text-[#545095] {% endif %}"
          href="{% url 'home' %}"
          >Home</a
        >
        <a
          class="text-lg font-bold text-[#545095] hover:text-primary transition-colors {% if request.resolver_match.app_name == 'email_verifier' %} text-primary {% else %} text-[#545095] {% endif %}"
          href="{% url 'email_verifier:index' %}"
          >Email Verifier</a
        >
        <a
          class="text-lg font-bold text-[#545095] hover:text-primary transition-colors {% if request.resolver_match.app_name == 'bulk_sender' %} text-primary {% else %} text-[#545095] {% endif %}"
          href="{% url 'bulk_sender:index' %}"
          >Bulk Sender</a
        >
      </nav>
      <!-- Auth Buttons -->
      <div class="flex items-center gap-3">
        <!-- Sign In -->
        <a
          href="{% url 'account:login' %}"
          class="px-4 py-2 text-sm font-bold rounded-lg transition-all {% if request.resolver_match.url_name == 'login' %} bg-primary text-white shadow-lg shadow-primary/20 {% else %} text-[#0f0e1b] hover:bg-[#e8e8f3] {% endif %}"
        >
          Sign In
        </a>

        <!-- Sign Up -->
        <a
          href="{% url 'account:register' %}"
          class="px-5 py-2 text-sm font-bold rounded-lg transition-all {% if request.resolver_match.url_name == 'register' %} bg-primary text-white shadow-lg shadow-primary/20 {% else %} text-[#0f0e1b] hover:bg-[#e8e8f3] {% endif %}"
        >
          Sign Up
        </a>
      </div>
      <div class="flex items-center gap-4">
<div class="flex items-center gap-3 pl-4 border-l border-slate-200 dark:border-slate-800">
<div class="text-right hidden sm:block">
<p class="text-sm font-medium">Alex Rivera</p>
<p class="text-xs text-slate-500">Pro Plan</p>
</div>
