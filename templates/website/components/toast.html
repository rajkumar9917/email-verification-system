<div
  id="toast-container"
  class="fixed top-6 right-6 z-[100] flex flex-col gap-4 w-full max-w-[380px]"
></div>

<style>
  @keyframes toastSlideIn {
    from {
      transform: translateX(120%) scale(0.9);
      opacity: 0;
    }
    to {
      transform: translateX(0) scale(1);
      opacity: 1;
    }
  }

  @keyframes toastFadeOut {
    to {
      opacity: 0;
      transform: translateX(120%) scale(0.9);
    }
  }

  .toast-enter {
    animation: toastSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .toast-exit {
    animation: toastFadeOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .toast-glass {
    background: rgba(
      20,
      21,
      34,
      0.8
    ) !important; /* bg-surface with transparency */
    backdrop-filter: blur(12px) saturate(180%);
    -webkit-backdrop-filter: blur(12px) saturate(180%);
  }
</style>

<script>
  function createToast(message, type = "success", duration = 4000) {
    const configurations = {
      success: {
        border: "border-green-500/50",
        iconColor: "text-green-400",
        progress: "bg-green-500/40",
        icon: "check_circle",
      },
      error: {
        border: "border-red-500/50",
        iconColor: "text-red-400",
        progress: "bg-red-500/40",
        icon: "report",
      },
      warning: {
        border: "border-amber-500/50",
        iconColor: "text-amber-400",
        progress: "bg-amber-500/40",
        icon: "warning",
      },
      info: {
        border: "border-primary/50",
        iconColor: "text-primary",
        progress: "bg-primary/40",
        icon: "info",
      },
    };

    const config = configurations[type] || configurations.info;
    const toast = document.createElement("div");

    toast.className = `
        relative flex items-center gap-4 p-4 rounded-2xl shadow-2xl 
        border ${config.border} toast-glass toast-enter group
    `;

    toast.innerHTML = `
        <div class="flex-shrink-0 flex items-center justify-center w-10 h-10 rounded-xl bg-background-dark/50 border border-border-subtle">
            <span class="material-symbols-outlined text-2xl ${config.iconColor}">
                ${config.icon}
            </span>
        </div>

        <div class="flex-1">
            <p class="text-sm font-bold text-white tracking-tight capitalize leading-tight">${type}</p>
            <p class="text-xs text-text-muted mt-0.5 font-medium">${message}</p>
        </div>

        <button class="w-8 h-8 flex items-center justify-center rounded-lg text-text-muted hover:text-white hover:bg-white/10 transition-all"
                onclick="removeToast(this.parentElement)">
            <span class="material-symbols-outlined text-lg">close</span>
        </button>

        <div class="absolute bottom-0 left-0 h-1 rounded-full ${config.progress} progress-bar mx-1 mb-0.5"></div>
    `;

    document.getElementById("toast-container").appendChild(toast);

    // Progress Bar Animation
    const progress = toast.querySelector(".progress-bar");
    progress.style.width = "calc(100% - 8px)";
    progress.style.transition = `width ${duration}ms linear`;
    setTimeout(() => (progress.style.width = "0%"), 50);

    // Auto Remove
    setTimeout(() => removeToast(toast), duration);
  }

  function removeToast(toast) {
    if (!toast) return;
    toast.classList.remove("toast-enter");
    toast.classList.add("toast-exit");
    setTimeout(() => toast.remove(), 450);
  }
</script>

{% if messages %}
<script>
  document.addEventListener("DOMContentLoaded", function() {
      {% for message in messages %}
          createToast("{{ message|escapejs }}", "{{ message.tags }}");
      {% endfor %}
  });
</script>
{% endif %}
