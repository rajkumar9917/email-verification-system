{% extends "website/base.html" %}
{% block content %}

<!-- Page Heading -->
<div class="mb-6 px-4">
    <h2 class="text-xl font-bold text-slate-800">Bulk Email Campaign</h2>
    <p class="text-slate-500 text-sm mt-1">
        Send messages to all your verified contacts at once.
    </p>
</div>

<!-- Form Card -->
<div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
    <form method="POST" class="p-8 space-y-6">
        {% csrf_token %}

        <!-- Recipients -->
        <div>
            <div class="flex justify-between items-center mb-2">
                <label class="text-sm font-semibold text-slate-700">
                    Recipients (Verified List)
                </label>
                <span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-1 rounded-md uppercase">
                    {{ valid_count }} Emails Ready
                </span>
            </div>

            <div class="relative group">
                <textarea
                    name="recipient_list"
                    readonly
                    class="w-full h-32 p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-500 focus:outline-none cursor-not-allowed leading-relaxed shadow-inner"
                    placeholder="No valid emails available. Please verify a list first.">{% if emails_string %}{{ emails_string }}{% else %}No verified emails found.{% endif %}</textarea>

                <div class="absolute inset-y-0 right-0 w-8 bg-gradient-to-l from-slate-50 to-transparent rounded-r-xl pointer-events-none"></div>
            </div>

            <p class="text-[11px] text-slate-400 mt-2 flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                These emails are pulled directly from your successful verification.
            </p>
        </div>

        <!-- Subject -->
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">
                Subject
            </label>
            <input
                type="text"
                name="subject"
                required
                class="w-full p-3 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                placeholder="Enter email subject line">
        </div>

        <!-- Message -->
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">
                Message Body
            </label>
            <textarea
                name="message"
                required
                rows="5"
                class="w-full p-4 border border-slate-200 rounded-xl text-sm text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                placeholder="Write your email content here..."></textarea>
        </div>

        <!-- Buttons -->
        <div class="pt-4 flex gap-4">
            <button
                type="submit"
                {% if valid_count == 0 %}disabled{% endif %}
                class="flex-[3] bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-100 transition-all flex items-center justify-center gap-3 active:scale-[0.98]
                {% if valid_count == 0 %}opacity-50 cursor-not-allowed{% endif %}">
                <span>Send Bulk Campaign</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
            </button>

            <button
                type="reset"
                class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold py-4 rounded-xl transition-all active:scale-[0.98]">
                Clear
            </button>
        </div>
    </form>
</div>

<!-- Footer Info -->
<div class="mt-6 flex items-center px-4">
    <div class="flex items-center gap-2 text-slate-400 text-[11px]">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>Server: SMTP Active</span>
    </div>
</div>

{% endblock %}
