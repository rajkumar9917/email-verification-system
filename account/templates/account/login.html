{% extends "website/base.html" %} {% block content %}

<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center p-6 sm:p-12">
  <div class="w-full max-w-[440px]">
    <!-- Login Card -->
    <div
      class="bg-white dark:bg-slate-900/50 dark:border dark:border-white/5 rounded-xl shadow-xl shadow-primary/5 p-8 sm:p-10"
    >
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">
          Welcome back
        </h2>
        <p class="text-slate-500 dark:text-slate-400 text-sm">
          Please enter your details to sign in.
        </p>
      </div>
      <form class="space-y-6">
        <!-- Email Field -->
        <div class="space-y-2">
          <label
            class="text-sm font-medium text-slate-700 dark:text-slate-300"
            for="email"
            >Email Address</label
          >
          <div class="relative group">
            <input
              class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder:text-slate-400 dark:placeholder:text-slate-500"
              id="email"
              name="email"
              placeholder="example@gmail.com"
              type="email"
            />
          </div>
        </div>
        <!-- Password Field -->
        <div class="space-y-2">
          <div class="flex items-center justify-between">
            <label
              class="text-sm font-medium text-slate-700 dark:text-slate-300"
              for="password"
              >Password</label
            >
            <a
              class="text-xs font-semibold text-primary hover:underline"
              href="#"
              >Forgot password?</a
            >
          </div>
          <div class="relative group">
            <input
              class="w-full h-12 px-4 pr-12 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder:text-slate-400 dark:placeholder:text-slate-500"
              id="password"
              name="password"
              placeholder="••••••••"
              type="password"
            />
            <button
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300"
              type="button"
            >
              <span class="material-symbols-outlined text-[20px]"
                >visibility</span
              >
            </button>
          </div>
        </div>
        <!-- Remember Me -->
        <div class="flex items-center gap-2">
          <input
            class="w-4 h-4 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary bg-white dark:bg-slate-800"
            id="remember"
            type="checkbox"
          />
          <label
            class="text-sm text-slate-600 dark:text-slate-400"
            for="remember"
            >Keep me signed in</label
          >
        </div>
        <!-- Submit Button -->
        <button
          class="w-full h-12 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2"
          type="submit"
        >
          <span>Sign In</span>
          <span class="material-symbols-outlined text-[18px]"
            >arrow_forward</span
          >
        </button>
      </form>
      <!-- Social Login Divider -->
      <div class="relative my-8">
        <div class="absolute inset-0 flex items-center">
          <div
            class="w-full border-t border-slate-200 dark:border-slate-800"
          ></div>
        </div>
        <div class="relative flex justify-center text-xs uppercase">
          <span
            class="bg-white dark:bg-slate-900 px-2 text-slate-500 dark:text-slate-400"
            >Or continue with</span
          >
        </div>
      </div>
      <!-- Social Button -->
      <button
        class="w-full h-11 border border-slate-200 dark:border-slate-700 rounded-lg flex items-center justify-center gap-3 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-sm font-medium text-slate-700 dark:text-slate-300"
        type="button"
      >
        <svg class="w-5 h-5" viewbox="0 0 24 24">
              <path
                d="M5.266 9.765A7.077 7.077 0 0 1 12 4.909c1.69 0 3.218.6 4.418 1.582L19.91 3C17.782 1.145 15.055 0 12 0 7.27 0 3.198 2.698 1.24 6.65l4.026 3.115z"
                fill="#EA4335"
              ></path>
              <path
                d="M16.04 18.013c-1.09.582-2.39.918-3.818.918-2.145 0-4.008-1.218-5.006-3.007l-4.116 3.19C5.02 22.33 8.334 24 12 24c3.273 0 6.273-1.091 8.563-2.945l-4.523-3.042z"
                fill="#34A853"
              ></path>
              <path
                d="M19.833 21.055C22.396 18.982 24 15.737 24 12c0-.764-.065-1.505-.196-2.222H12v4.582h6.741c-.328 1.636-1.255 3.022-2.618 3.927l3.71 2.768z"
                fill="#4285F4"
              ></path>
              <path
                d="M5.109 16.014a7.046 7.046 0 0 1-.363-2.214c0-.777.13-1.527.363-2.214L1.083 8.471A11.974 11.974 0 0 0 0 12c0 1.265.196 2.484.557 3.628l4.552-3.614z"
                fill="#FBBC05"
              ></path>
            </svg>
        Sign in with Google
      </button>
    </div>
    <!-- Bottom Text -->
    <p class="mt-8 text-center text-sm text-slate-500 dark:text-slate-400">
      Don't have an account?
      <a class="font-semibold text-primary hover:underline" href="{% url 'account:register' %}"
        >Sign up for free</a
      >
    </p>
  </div>
</main>

{% endblock %}
